name: Build and deploy Expo web to Azure Static Web Apps

on:
  pull_request:
    branches:
    - main
    paths:
    - frontend/**
    - .github/workflows/hashstats-frontend-static-web-app.yml
  push:
    branches:
    - main
    paths:
    - frontend/**
    - .github/workflows/hashstats-frontend-static-web-app.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HASHSTATS_FRONTEND }}

    steps:
    - uses: actions/checkout@v4

    - name: Verify Azure Static Web Apps token
      if: github.event_name != 'pull_request' && env.AZURE_STATIC_WEB_APPS_API_TOKEN == ''
      run: |
        echo "::error::Missing secret AZURE_STATIC_WEB_APPS_API_TOKEN_HASHSTATS_FRONTEND."
        exit 1

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19.0'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Build frontend
      working-directory: frontend
      run: npm run build:web

    - name: Verify frontend build output
      run: |
        test -f frontend/dist/index.html
        test -f frontend/dist/staticwebapp.config.json
        find frontend/dist -maxdepth 2 -type f | sort | sed -n '1,120p'

    - name: Deploy frontend to Azure Static Web Apps
      if: github.event_name != 'pull_request'
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: upload
        app_location: frontend/dist
        api_location: ''
        output_location: ''
        skip_app_build: true
        skip_api_build: true
        production_branch: main
