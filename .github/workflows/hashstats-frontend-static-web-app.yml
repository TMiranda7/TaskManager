name: Build and deploy Expo web to Azure Static Web Apps

on:
  pull_request:
    branches:
    - main
    paths:
    - frontend/**
    - .github/workflows/hashstats-frontend-static-web-app.yml
  push:
    branches:
    - main
    paths:
    - frontend/**
    - .github/workflows/hashstats-frontend-static-web-app.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HASHSTATS_FRONTEND }}

    steps:
    - uses: actions/checkout@v4

    - name: Verify Azure Static Web Apps token
      if: github.event_name != 'pull_request' && env.AZURE_STATIC_WEB_APPS_API_TOKEN == ''
      run: |
        echo "::error::Missing secret AZURE_STATIC_WEB_APPS_API_TOKEN_HASHSTATS_FRONTEND."
        exit 1

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19.0'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Build frontend
      working-directory: frontend
      run: npm run build:web

    - name: Deploy frontend to Azure Static Web Apps
      if: github.event_name != 'pull_request'
      env:
        SWA_CLI_DEBUG: silly
      run: npx -y @azure/static-web-apps-cli deploy frontend/dist --swa-config-location frontend/dist --deployment-token "$AZURE_STATIC_WEB_APPS_API_TOKEN" --env production
